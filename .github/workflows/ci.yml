name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
    env:
      AUTH_SECRET: test-secret-for-ci
      DATABASE_URL: postgresql://test:test@localhost/test
      NEXTAUTH_URL: http://localhost:3000

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
    env:
      AUTH_SECRET: test-secret-for-ci
      DATABASE_URL: postgresql://test:test@localhost/test
      NEXTAUTH_URL: http://localhost:3000

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
    env:
      AUTH_SECRET: test-secret-for-ci
      DATABASE_URL: postgresql://test:test@localhost/test
      NEXTAUTH_URL: http://localhost:3000
